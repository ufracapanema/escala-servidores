<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Atendimento - Mural Portaria</title>
    <style>
        @page {
            size: A4 landscape;
            margin: 6mm;
        }

        :root {
            --m-bg: #f59e0b; 
            --t-bg: #3b82f6; 
            --n-bg: #6366f1; 
            --p-pres: #10b981; 
            --t-tele: #2563eb; 
            --c-chef: #8b5cf6; 
            --a-afas: #ef4444; 
            --d-desc: #94a3b8; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #fff;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .setor-container {
            page-break-after: always;
            border: 2.2px solid #000;
            min-height: 195mm;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .setor-grid-nome {
            background-color: #1e3a8a !important;
            color: white !important;
            padding: 12px;
            font-size: 22pt;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
        }

        .setor-grid-email {
            background-color: #f1f5f9 !important;
            padding: 5px;
            text-align: center;
            font-size: 11pt;
            border-bottom: 1.5px solid #000;
            color: #1e3a8a;
            font-weight: bold;
        }

        .servidores-lista { flex-grow: 1; }

        .servidor-item {
            display: grid;
            grid-template-columns: 290px 1fr;
            padding: 10px 15px;
            border-bottom: 1.5px solid #cbd5e1;
            align-items: center;
        }

        .servidor-nome {
            font-size: 13pt;
            font-weight: 800;
            color: #000;
            text-transform: uppercase;
        }

        .contato-info { margin-top: 5px; }
        .contato-item {
            font-size: 10.5pt;
            color: #000;
            font-weight: 700;
            display: flex;
            align-items: center;
            margin-bottom: 2px;
        }

        .turno-linha { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .turno-info { width: 90px; text-align: center; }

        /* BADGE DO TURNO */
        .turno-badge {
            font-size: 7pt;
            font-weight: 900;
            padding: 2px 4px;
            border-radius: 3px;
            color: white !important;
            text-align: center;
            display: block;
            margin-bottom: 3px;
        }

        /* HORÁRIO EM DESTAQUE */
        .turno-hora {
            font-size: 10pt; /* Aumentado para visibilidade */
            font-weight: 800; /* Negrito forte */
            color: #000 !important;
            display: block;
            white-space: nowrap;
        }

        .m-bg { background-color: var(--m-bg) !important; }
        .t-bg { background-color: var(--t-bg) !important; }
        .n-bg { background-color: var(--n-bg) !important; }
        .a-bg { background-color: var(--a-afas) !important; }

        /* DIAS COMPACTOS */
        .dias-grid { display: flex; gap: 3px; flex: 1; }
        .dia-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2px 0;
            background: #f1f5f9 !important;
            border-radius: 4px;
            min-width: 30px;
        }

        .dia-sigla {
            font-size: 7.5pt;
            font-weight: 900;
            color: #334155;
        }

        .status-badge {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 9pt;
            font-weight: 900;
            color: white !important;
        }

        .p-presencial { background-color: var(--p-pres) !important; }
        .t-teletrabalho { background-color: var(--t-tele) !important; }
        .c-chefia { background-color: var(--c-chef) !important; }
        .a-afastado { background-color: var(--a-afas) !important; }
        .d-descanso { background-color: var(--d-desc) !important; }
        .vazio { background-color: #e2e8f0 !important; color: transparent !important; }

        .footer-completo { padding: 10px; border-top: 1.5px solid #000; }
        .footer-legenda {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 8.5pt;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .legenda-item { display: flex; align-items: center; gap: 4px; }
        .legenda-box { width: 12px; height: 12px; border-radius: 2px; }

        .observacao-final {
            text-align: center;
            font-size: 9pt;
            font-weight: 700;
            color: #000;
            padding: 6px;
            border: 1.5px dashed #000;
            background-color: #f8fafc !important;
        }

        @media print {
            #btn-imprimir { display: none; }
            .setor-container { border: 2px solid #000; }
        }
    </style>
</head>
<body>

    <button id="btn-imprimir" onclick="window.print()" style="position: fixed; top: 10px; right: 10px; padding: 15px; z-index: 999; cursor: pointer; background: #1e3a8a; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 12pt; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">🖨️ IMPRIMIR ESCALA</button>

    <div id="conteudo"></div>

    <script>
        const url = 'https://script.google.com/macros/s/AKfycbzHe6FYRN5bwebFslDF-pecwnUWpY9WXDF_Nl9V1sYncbwfIVmZ0k-Mqu6WUDNoYZtZxw/exec';

        function formatarTelefone(num) {
            const l = ('' + num).replace(/\D/g, '');
            if (l.length === 11) return `(${l.substring(0,2)}) ${l.substring(2,7)}-${l.substring(7)}`;
            if (l.length === 10) return `(${l.substring(0,2)}) ${l.substring(2,6)}-${l.substring(6)}`;
            return num;
        }

        async function carregarDados() {
            const siglas = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SAB'];
            try {
                const res = await fetch(url);
                const dados = await res.json();
                const linhas = dados.slice(1);
                const setoresMap = {};
                const infoSetores = {};

                for (let i = 0; i < linhas.length; i += 3) {
                    const l1 = linhas[i];
                    if (!l1 || !l1[0]) continue;
                    const setor = l1[0].trim();
                    if (!setoresMap[setor]) { 
                        setoresMap[setor] = []; 
                        infoSetores[setor] = l1[1]; 
                    }
                    const serv = { nome: l1[2], email: l1[4], zap: l1[5], turnos: [] };
                    [linhas[i], linhas[i+1], linhas[i+2]].forEach((linha, idx) => {
                        if (linha && (linha[3] || linha.slice(6,13).some(d => d && d !== '-'))) {
                            serv.turnos.push({ 
                                label: idx===0?'Manhã':idx===1?'Tarde':'Noite', 
                                class: idx===0?'m-bg':idx===1?'t-bg':'n-bg', 
                                hora: linha[3], 
                                dias: linha.slice(6, 13) 
                            });
                        }
                    });
                    setoresMap[setor].push(serv);
                }

                let htmlFinal = '';
                Object.keys(setoresMap).sort().forEach((setor) => {
                    let servidoresHtml = '';
                    setoresMap[setor].sort((a,b) => a.nome.localeCompare(b.nome)).forEach(serv => {
                        let turnosHtml = serv.turnos.map(t => {
                            const estaAfastado = t.dias.some(d => d && d.toString().toUpperCase() === 'A');
                            return `
                            <div class="turno-linha">
                                <div class="turno-info">
                                    <span class="turno-badge ${estaAfastado ? 'a-bg' : t.class}">${estaAfastado ? 'AFASTADO' : t.label}</span>
                                    <span class="turno-hora">${t.hora || '--:--'}</span>
                                </div>
                                <div class="dias-grid">
                                    ${siglas.map((sigla, dIdx) => {
                                        const st = t.dias[dIdx] ? t.dias[dIdx].toString().toUpperCase() : '-';
                                        const cl = st==='C'?'c-chefia':st==='P'?'p-presencial':st==='T'?'t-teletrabalho':st==='A'?'a-afastado':st==='D'?'d-descanso':'vazio';
                                        return `
                                            <div class="dia-col">
                                                <span class="dia-sigla">${sigla}</span>
                                                <span class="status-badge ${cl}">${st !== '-' ? st : ''}</span>
                                            </div>`;
                                    }).join('')}
                                </div>
                            </div>`;
                        }).join('');

                        servidoresHtml += `
                            <div class="servidor-item">
                                <div class="servidor-perfil">
                                    <span class="servidor-nome">${serv.nome}</span>
                                    <div class="contato-info">
                                        <span class="contato-item">✉ ${serv.email || ''}</span>
                                        <span class="contato-item">📞 ${serv.zap ? formatarTelefone(serv.zap) : ''}</span>
                                    </div>
                                </div>
                                <div>${turnosHtml}</div>
                            </div>`;
                    });

                    htmlFinal += `
                        <div class="setor-container">
                            <div class="setor-grid-nome">${setor}</div>
                            <div class="setor-grid-email">E-mail Setor: ${infoSetores[setor] || '---'}</div>
                            <div class="servidores-lista">${servidoresHtml}</div>
                            <div class="footer-completo">
                                <div class="footer-legenda">
                                    <div class="legenda-item"><div class="legenda-box p-presencial"></div> P: Presencial</div>
                                    <div class="legenda-item"><div class="legenda-box t-teletrabalho"></div> T: Teletrabalho</div>
                                    <div class="legenda-item"><div class="legenda-box c-chefia"></div> C: Chefia</div>
                                    <div class="legenda-item"><div class="legenda-box a-afastado"></div> A: Afastado</div>
                                    <div class="legenda-item"><div class="legenda-box d-descanso"></div> D: Descanso</div>
                                </div>
                                <div class="observacao-final">
                                    ⚠️ Observação: Estes são os horários de atendimento ao público. A jornada integral de trabalho é de 8 horas diárias, ressalvados os servidores com regime especial de 6 horas diárias.
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById('conteudo').innerHTML = htmlFinal;
            } catch (e) {
                console.error(e);
                document.getElementById('conteudo').innerHTML = "<h2 style='text-align:center; padding-top:50px;'>Erro ao carregar dados.</h2>";
            }
        }
        carregarDados();
    </script>
</body>
</html>
